dataset:
  config: configs/dataset.real_records.yaml
  root: data/real_robot_records_6_30_5epis_lerobot
  episode_index: 0

policy:
  policy_type: smolvla
  checkpoint: outputs/smolvla_real_full_finetune/checkpoints/last/pretrained_model
  device: cuda

inference:
  checkpoint: outputs/smolvla_real_full_finetune/checkpoints/last/pretrained_model
  source: dataset_replay
  dry_run: true
  hardware_enabled: false
  output_dir: outputs/offline_inference_rtc

control:
  control_frequency_hz: 10
  policy_frequency_hz: 10
  maximum_steps: 40

chunk_execution:
  mode: rtc
  async_inference: true
  rtc:
    execution_horizon: 10
    max_guidance_weight: 10.0
    prefix_attention_schedule: exp
    inference_delay_mode: measured
    initial_inference_delay_steps: 2
    minimum_inference_delay_steps: 1
    maximum_inference_delay_steps: 10
    latency_ema_alpha: 0.2

