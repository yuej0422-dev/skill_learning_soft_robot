dataset:
  config: configs/dataset.real_records.yaml
  root: data/real_robot_records_6_30_5epis_lerobot
  episodes: [0, 1, 2, 3]

policy:
  name: smolvla
  pretrained_path: lerobot/smolvla_base
  batch_size: 1
  steps: 300
  gradient_accumulation_steps: 1
  num_workers: 0
  device: cuda
  use_amp: true
  freeze_vision_encoder: false
  train_expert_only: false
  train_state_proj: true
  use_peft: false
  push_to_hub: false
  checkpoint_dir: outputs/gripper_training_comparison/identity
  save_freq: 300
  log_freq: 10
  eval_freq: 0

action_normalization:
  tcp_mode: mean_std
  gripper_mode: identity

gripper_training:
  transition_oversampling:
    enabled: false
  loss_weight:
    enabled: false
    tcp_weight: 1.0
    gripper_weight: 1.0

