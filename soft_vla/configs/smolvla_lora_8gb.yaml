dataset:
  config: configs/dataset.synthetic.yaml
  root: data/synthetic_soft_robot_vla

policy:
  name: smolvla
  pretrained_path: lerobot/smolvla_base
  batch_size: 1
  steps: 20
  gradient_accumulation_steps: 1
  num_workers: 0
  device: cuda
  use_amp: true
  freeze_vision_encoder: true
  train_expert_only: true
  train_state_proj: true
  use_peft: true
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05
  push_to_hub: false
  checkpoint_dir: outputs/smolvla_lora_smoke
  save_freq: 20
  log_freq: 1
  eval_freq: 0

